name: UI Tests

on:
  workflow_dispatch:
    inputs:
      env:
        description: Environment
        required: true
        default: prod
        type: choice
        options:
          - prod
      browser:
        description: Browser
        required: true
        default: chromium
        type: choice
        options:
          - chromium
          - firefox
          - webkit
      suite:
        description: Test suite
        required: true
        default: smoke
        type: choice
        options:
          - smoke
          - all

jobs:
  ui-tests:
    name: Run Playwright Tests
    runs-on: ubuntu-latest

    env:
      ENV: ${{ inputs.env }}
      BROWSER: ${{ inputs.browser }}
      SUITE: ${{ inputs.suite == 'all' && '' || inputs.suite }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run tests
        run: |
          if [ "${SUITE}" = "" ]; then
            ENV=$ENV BROWSER=$BROWSER npm run test:run
          else
            ENV=$ENV BROWSER=$BROWSER SUITE=$SUITE npm run test:run
          fi

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: test-results
          if-no-files-found: ignore
          retention-days: 7